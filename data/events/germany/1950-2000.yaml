# 德国 1950-2000（西德/东德分裂→冷战→统一→后统一时代）
# 1949-1990：东西德分裂并存
# 1990-2000：统一后重建与欧洲整合

# ── Level 1 ──────────────────────────────────────────

- id: germany_two_states_founded
  year: 1949
  level: 1
  title: 东西德相继建国
  summary: 1949年联邦德国（西德）5月建立，德意志民主共和国（东德）10月建立，德国正式分裂。
