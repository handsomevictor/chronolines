  figures: [sugita_genpaku]

- id: japan_kansei_reform
  year: 1787
  endYear: 1793
  level: 1
  title: 宽政改革
  summary: 松平定信推行宽政改革，禁奢侈、整肃风俗、限制思想，确立朱子学为官学。
