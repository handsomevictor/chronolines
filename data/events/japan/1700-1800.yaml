  figures: [matsudaira_sadanobu]

- id: japan_hayashi_shihei_kaikoku
  year: 1791
  level: 1
  title: 《海国兵谈》出版
  summary: 林子平著《海国兵谈》，警告俄国等西方势力对日本海防的威胁，后遭幕府处分。
  tags: [文化思想]
  figures: [hayashi_shihei]

- id: japan_edo_culture_peak
  year: 1750
  endYear: 1800
  level: 1
  title: 宝历・天明文化兴盛
  summary: 浮世绘黄金期到来，北斋、歌麿等画师活跃，黄表纸、洒落本等通俗文学繁荣。
  tags: [文化思想]
  figures: [katsushika_hokusai, kitagawa_utamaro]

# ── Level 2 ──────────────────────────────────────────────────────────────────

- id: japan_tokugawa_ienobu
  year: 1709
  endYear: 1712
  level: 2
  title: 德川家宣就任将军
  summary: 德川幕府第六代将军德川家宣即位，废除部分"生类怜悯令"，推行儒学政治。
  tags: [王朝更迭]

- id: japan_tokugawa_ietsugu
  year: 1713
  endYear: 1716
  level: 2
  title: 德川家继就任将军
  summary: 德川幕府第七代将军德川家继年仅三岁即位，新井白石辅政，推行"正德之治"。
  tags: [王朝更迭]

- id: japan_arai_hakuseki_reforms
  year: 1709
  endYear: 1716
  level: 2
  title: 新井白石正德之治
  summary: 儒学者新井白石在德川家宣・家继时期辅政，整顿货币、改定外交礼仪，被称为"正德之治"。
  tags: [改革运动]

- id: japan_tokugawa_yoshimune_shogun
  year: 1716
  level: 2
  title: 德川吉宗就任将军
  summary: 德川幕府第八代将军德川吉宗即位，此后推行享保改革，是幕府中兴之主。
  tags: [王朝更迭]
  figures: [tokugawa_yoshimune]

- id: japan_meyasubako
  year: 1721
  level: 2
  title: 目安箱设置
  summary: 德川吉宗在江户设置"目安箱"，允许庶民投书直接反映民情，是一种民意收集机制。
