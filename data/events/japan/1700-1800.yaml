- id: japan_ainu_matsumae_trade
  year: 1700
  endYear: 1800
  level: 2
  title: 松前藩与阿伊努人贸易
  summary: 松前藩对阿伊努人实行场所请负制，将渔场贸易权承包给商人，阿伊努人处境日益恶化。
