- id: japan_tokugawa_ieharu_shogun
  year: 1760
  level: 2
  title: 德川家治就任将军
  summary: 德川幕府第十代将军德川家治即位，实际政务逐渐落入侧用人田沼意次之手。
  tags: [王朝更迭]

- id: japan_tokugawa_ieshige_shogun
  year: 1745
  level: 2
  title: 德川家重就任将军
  summary: 德川幕府第九代将军德川家重即位，言语不清，政务倚重大冈忠光，内政较为平稳。
  tags: [王朝更迭]

- id: japan_tokugawa_ienari_shogun
  year: 1787
  level: 2
  title: 德川家齐就任将军
  summary: 德川幕府第十一代将军德川家齐即位，在位五十年，前期宽政改革后期政治弛缓。
  tags: [王朝更迭]

- id: japan_tanuma_downfall
  year: 1786
  level: 2
  title: 田沼意次失势
  summary: 德川家治去世后，田沼意次随即失去权位，宽政改革派取而代之，重商政策遭到否定。
  tags: [改革运动]
  figures: [tanuma_okitsugu]

- id: japan_russia_contact_1792
  year: 1792
  level: 2
  title: 俄国拉克斯曼来航
  summary: 俄国使节拉克斯曼来航根室，送还漂流民，要求开国通商，幕府拒绝并仅给予长崎渡航许可证。
  tags: [条约外交]

- id: japan_matsumae_han
  year: 1700
  endYear: 1800
  level: 2
  title: 松前藩对蝦夷地统治
  summary: 松前藩垄断对阿伊努人贸易，通过场所制度控制北海道资源，引发多次阿伊努人反抗。
