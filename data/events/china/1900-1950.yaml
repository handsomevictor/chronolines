  figures: [chen_duxiu, hu_shi, li_dazhao]

- id: china_zhili_fengtian_wars
  year: 1920
  endYear: 1924
  level: 3
  title: 直奉战争
  summary: 直系军阀与奉系军阀先后两次爆发战争，争夺北京中央政权，民国政局动荡不安。
