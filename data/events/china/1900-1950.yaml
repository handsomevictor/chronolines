  figures: [mao_zedong, zhu_de]

- id: china_chiang_capital_nanjing
  year: 1928
  level: 3
  title: 国民政府定都南京
  summary: 北伐完成后蒋介石国民政府迁都南京，开始"黄金十年"建设，完成名义上的统一。
