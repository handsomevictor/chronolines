  figures: [chiang_kaishek, mao_zedong]

- id: china_taierzhuang_victory
  year: 1938
  level: 3
  title: 台儿庄战役
  summary: 中国军队在台儿庄大败日军，为抗战初期最具代表性的正面战场胜利之一。
  tags: [战争]
  figures: [chiang_kaishek]

- id: china_wuhan_fall
  year: 1938
