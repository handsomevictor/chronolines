  figures: [chiang_kaishek, mao_zedong]

- id: china_zunyi_conference
  year: 1935
  level: 3
  title: 遵义会议
  summary: 长征途中召开的遵义会议确立毛泽东在红军中的领导地位，成为中共历史转折点。
  tags: [革命政变]
  figures: [mao_zedong, zhu_de]

- id: china_lugouqiao_full_war
  year: 1937
  level: 3
  title: 抗战全面爆发
  summary: 1937年7月7日卢沟桥事变后，国共宣告第二次合作，组成抗日民族统一战线。
