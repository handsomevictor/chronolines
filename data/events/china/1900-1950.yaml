  figures: [chiang_kaishek]

- id: china_encirclement_campaigns
  year: 1930
  endYear: 1934
  level: 3
  title: 国民党五次围剿红军
  summary: 国民党军队对中央苏区发动五次围剿，前四次被红军击退，第五次成功迫使红军长征。
