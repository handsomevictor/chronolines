  figures: [chen_duxiu]

- id: china_autumn_harvest_uprising
  year: 1927
  level: 3
  title: 秋收起义
  summary: 毛泽东领导湘赣边界秋收起义，失败后率部上井冈山，开始农村包围城市道路探索。
