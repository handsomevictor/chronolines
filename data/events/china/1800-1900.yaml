  figures: [hong_xiuquan]

- id: china_taiping_tianjing_incident
  year: 1856
  level: 3
  title: 天京事变
  summary: 太平天国内部东王杨秀清、北王韦昌辉相继被杀，翼王石达开出走，政权由盛转衰。
  tags: [革命政变]
  figures: [hong_xiuquan]

- id: china_xianfeng_flee_beijing
  year: 1860
  level: 3
  title: 咸丰帝出走热河
  summary: 英法联军进逼北京，咸丰帝携皇后嫔妃出走热河避难，由此未能直接处置危机。
  tags: [战争]
  figures: [xianfeng, cixi]

- id: china_xianfeng_death
  year: 1861
  level: 3
  title: 咸丰帝驾崩于热河
  summary: 咸丰帝在热河行宫驾崩，年仅31岁，皇子载淳继位，是为同治帝。
  tags: [王朝更迭]
  figures: [xianfeng, cixi]

- id: china_cixi_xinyou_coup
  year: 1861
  level: 3
  title: 辛酉政变
  summary: 慈禧太后与恭亲王奕訢联手，推翻热河顾命八大臣，慈禧开始垂帘听政。
