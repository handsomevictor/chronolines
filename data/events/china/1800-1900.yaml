  figures: [cixi]

- id: china_tongzhi_ascends
  year: 1861
  level: 3
  title: 同治帝继位
  summary: 载淳继位，年号同治，由慈安太后与慈禧太后垂帘听政，恭亲王辅政。
  tags: [王朝更迭]
  figures: [cixi]

- id: china_ever_victorious_army
  year: 1862
  endYear: 1864
  level: 3
  title: 常胜军参与镇压太平天国
  summary: 洋枪队改组为常胜军，先后由华尔、戈登（"中国戈登"）指挥，协助清军作战。
