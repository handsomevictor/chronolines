- id: china_daoguang_ascends
  year: 1820
  level: 3
  title: 道光帝继位
  summary: 爱新觉罗旻宁继位，年号道光，在位期间清朝内忧外患日益严峻。
  tags: [王朝更迭]
  figures: [daoguang]

- id: china_opium_import_grows
  year: 1820
  endYear: 1839
  level: 3
  title: 鸦片进口量急剧增加
  summary: 英国东印度公司从印度输入中国的鸦片从每年数千箱增至数万箱，白银大量外流。
  tags: [经济贸易]

- id: china_humen_fort_destroyed
  year: 1841
  level: 3
  title: 虎门炮台失守
  summary: 英军炮击广东虎门炮台，守将关天培战死，英军顺利进入珠江，广州门户洞开。
