  figures: [zeng_guofan]

- id: china_tongzhi_death
  year: 1875
  level: 3
  title: 同治帝驾崩
  summary: 同治帝驾崩，年仅19岁，无子，慈禧太后择其侄载湉继位，是为光绪帝。
  tags: [王朝更迭]
  figures: [cixi]

- id: china_guangxu_ascends
  year: 1875
  level: 3
  title: 光绪帝继位
  summary: 光绪帝即位，年仅四岁，慈禧太后继续垂帘听政，掌握清廷最高权力。
  tags: [王朝更迭]
  figures: [guangxu, cixi]

- id: china_chefoo_convention
  year: 1876
  level: 3
  title: 《烟台条约》签订
  summary: 中英就马嘉理案签订《烟台条约》，增开口岸，英国获进一步通商及司法特权。
  tags: [条约外交]
  figures: [li_hongzhang]

- id: china_ili_treaty
  year: 1881
  level: 3
  title: 《伊犁条约》签订
  summary: 清俄签订《伊犁条约》，俄国归还伊犁，但保留部分领土及贸易特权，清朝支付赔款。
  tags: [条约外交]
  figures: [zuo_zongtang, li_hongzhang]

- id: china_li_hongzhang_foreign_affairs
  year: 1870
  endYear: 1895
  level: 3
  title: 李鸿章主持外交事务
  summary: 李鸿章主持北洋通商大臣职务期间，代表清廷处理对外交涉，签署多项条约。
  tags: [条约外交]
  figures: [li_hongzhang]

- id: china_rehe_province_reform
  year: 1877
  level: 3
  title: 清廷整顿吏治
  summary: 光绪初年，慈禧太后与翁同龢等力图整顿吏治，多名贪腐官员被查处。
  tags: [改革运动]

- id: china_sino_french_halong
  year: 1884
  level: 3
