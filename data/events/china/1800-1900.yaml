  figures: [hong_xiuquan]

- id: china_taiping_nanjing_capital
  year: 1853
  level: 3
  title: 太平天国定都天京
  summary: 太平军攻占南京，改名天京，定为太平天国首都，颁布《天朝田亩制度》。
