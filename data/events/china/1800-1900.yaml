  figures: [li_hongzhang, zeng_guofan]

- id: china_zeng_guofan_death
  year: 1872
  level: 3
  title: 曾国藩逝世
  summary: 曾国藩在南京两江总督任上病逝，为晚清最具影响力的汉族官员之一。
