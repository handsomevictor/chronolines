  figures: [linzexu]

- id: china_shashi_treaty_ports
  year: 1842
  level: 3
  title: 五口通商开放
  summary: 依据《南京条约》，广州、厦门、福州、宁波、上海五口对外正式开放通商。
  tags: [条约外交, 经济贸易]

- id: china_xianfeng_ascends
  year: 1850
  level: 3
  title: 咸丰帝继位
  summary: 道光帝驾崩，皇四子奕詝继位，是为咸丰帝，在位期间内忧外患达顶点。
  tags: [王朝更迭]
  figures: [xianfeng]

- id: china_daoguang_death
  year: 1850
  level: 3
  title: 道光帝驾崩
  summary: 道光帝在位30年后驾崩，终年68岁，其在位期间清朝遭受第一次鸦片战争失败。
  tags: [王朝更迭]
  figures: [daoguang]

- id: china_taiping_jintian
  year: 1851
  level: 3
  title: 太平天国金田起义
  summary: 洪秀全在广西金田村宣布起义，建号太平天国，拜上帝会众追随，起义正式爆发。
