# 中国 1800-1900 历史事件
# 涵盖嘉庆、道光、咸丰、同治、光绪朝

# ===== Level 1 事件 =====

- id: china_heshen_fall
  year: 1799
  level: 1
  title: 和珅被赐死、抄家
  summary: 乾隆帝驾崩后，嘉庆帝立即逮捕和珅，列二十大罪赐其自尽，抄没巨额家产。
  tags: [人物, 革命政变]
  figures: [heshen, jiaqing]

- id: china_white_lotus_end
  year: 1804
  level: 1
  title: 白莲教起义平定
  summary: 历时近九年的白莲教起义被清军镇压，耗费清廷约两亿两白银，财政大为损耗。
  tags: [革命政变]
  figures: [jiaqing]

- id: china_opium_war_1
  year: 1840
  endYear: 1842
  level: 1
  title: 第一次鸦片战争
  summary: 英国对华宣战，清军战败，签订《南京条约》割让香港岛、开放五口通商。
  tags: [战争, 条约外交]
  related: [uk_opium_war]
  figures: [linzexu, daoguang]

- id: china_nanjing_treaty
  year: 1842
  level: 1
  title: 《南京条约》签订
  summary: 中英签订《南京条约》，开放广州等五口通商，割让香港岛，赔款两千一百万银元。
  tags: [条约外交]
  figures: [daoguang, li_hongzhang]
  related: [uk_opium_war]

- id: china_taiping
  year: 1851
  endYear: 1864
  level: 1
  title: 太平天国运动
  summary: 洪秀全建立太平天国，定都天京，与清廷长期对抗，各方记载伤亡数字存在差异。
  tags: [革命政变]
  figures: [hong_xiuquan, zeng_guofan, li_hongzhang]

- id: china_opium_war_2
  year: 1856
  endYear: 1860
  level: 1
  title: 第二次鸦片战争
  summary: 英法联军攻入北京，火烧圆明园，清廷签订《北京条约》割让九龙半岛。
  tags: [战争, 条约外交]
  related: [uk_second_opium, france_second_opium]
  figures: [xianfeng]

- id: china_beijing_treaty
  year: 1860
  level: 1
  title: 《北京条约》签订
  summary: 中英、中法、中俄分别签订《北京条约》，割让九龙、开放天津，赔款大幅增加。
  tags: [条约外交]
  figures: [xianfeng]

- id: china_self_strengthening
  year: 1861
  endYear: 1895
  level: 1
  title: 洋务运动
  summary: 清廷推行洋务运动，引进西方技术兴办军工、民用企业，建立近代海军。
  tags: [改革运动, 科技发明]
  figures: [zeng_guofan, li_hongzhang, zuo_zongtang]

- id: china_sino_japanese_war
  year: 1894
  endYear: 1895
  level: 1
  title: 甲午战争
  summary: 清朝与日本因朝鲜问题开战，清军战败，签订《马关条约》割让台湾及辽东半岛。
  tags: [战争, 条约外交]
  related: [japan_meiji_expansion]
  figures: [li_hongzhang]

- id: china_shimonoseki_treaty
  year: 1895
  level: 1
  title: 《马关条约》签订
  summary: 中日签订《马关条约》，割让台湾、澎湖列岛及辽东半岛，赔款二亿两白银。
  tags: [条约外交]
  figures: [li_hongzhang]

- id: china_hundred_days
  year: 1898
  level: 1
  title: 戊戌变法
  summary: 光绪帝支持康有为等推行变法，历时103天后被慈禧太后发动政变终止。
  tags: [改革运动]
  figures: [guangxu, kang_youwei, liang_qichao, cixi]

- id: china_yihetuan
  year: 1899
  endYear: 1901
  level: 1
  title: 义和团运动
  summary: 义和团在北方各地兴起，攻击教堂与外国人，清廷一度支持，引发八国联军干涉。
  tags: [革命政变, 战争]
  figures: [cixi]

# ===== Level 2 事件 =====

- id: china_jiaqing_tianli_uprising
  year: 1813
  level: 2
  title: 天理教攻入紫禁城
  summary: 天理教信徒趁嘉庆帝出巡，攻入紫禁城，被守军击退，震动朝廷。
  tags: [革命政变]
  figures: [jiaqing]

- id: china_opium_ban_daoguang
  year: 1838
  level: 2
  title: 道光帝严令禁烟
  summary: 道光帝任命林则徐为钦差大臣赴广东查禁鸦片，开始严厉禁烟行动。
  tags: [改革运动]
  figures: [daoguang, linzexu]

- id: china_humen_burn_opium
  year: 1839
  level: 2
  title: 虎门销烟
  summary: 林则徐在广东虎门收缴英美商人鸦片共约两百余万斤，公开销毁，中英关系急剧恶化。
  tags: [改革运动, 经济贸易]
  figures: [linzexu]

- id: china_wangxia_treaty
  year: 1844
  level: 2
  title: 《望厦条约》签订
  summary: 中美签订《望厦条约》，美国获得领事裁判权及最惠国待遇，清朝对外开放扩大。
  tags: [条约外交]

- id: china_huangpu_treaty
  year: 1844
  level: 2
  title: 《黄埔条约》签订
  summary: 中法签订《黄埔条约》，法国获得与英美相同的领事裁判权及贸易权利。
  tags: [条约外交]

- id: china_tianjin_treaty
  year: 1858
  level: 2
  title: 《天津条约》签订
  summary: 清廷与英、法、俄、美分别签订《天津条约》，进一步扩大通商口岸和外交权利。
  tags: [条约外交]

- id: china_yuanmingyuan_burning
  year: 1860
  level: 2
  title: 英法联军火烧圆明园
  summary: 英法联军占领北京后火烧圆明园，大量文物遭破坏或被掠走，建筑群被毁。
  tags: [战争, 文化思想]

- id: china_zongli_yamen
  year: 1861
  level: 2
  title: 总理各国事务衙门成立
  summary: 清廷设立总理各国事务衙门，专门处理对外事务，为中国近代外交机构之始。
  tags: [改革运动, 条约外交]
  figures: [zeng_guofan]

- id: china_jiangnan_arsenal
  year: 1865
  level: 2
  title: 江南制造总局创建
  summary: 李鸿章在上海创建江南制造总局，引进西方机器设备，生产枪炮弹药舰船。
  tags: [科技发明, 改革运动]
  figures: [li_hongzhang]

- id: china_fuzhou_shipyard
  year: 1866
  level: 2
  title: 福州船政局创办
  summary: 左宗棠创办福州船政局，建造近代军舰，并附设船政学堂培养近代海军人才。
  tags: [科技发明, 改革运动]
  figures: [zuo_zongtang]

- id: china_taiping_fall
  year: 1864
  level: 2
  title: 太平天国灭亡
  summary: 湘军攻破天京（南京），洪秀全已死，太平天国政权彻底覆灭，历时14年。
  tags: [革命政变]
  figures: [zeng_guofan, hong_xiuquan]

- id: china_nian_rebellion
  year: 1851
  endYear: 1868
  level: 2
  title: 捻军起义
  summary: 淮河流域捻军长期活动，与太平天国互相呼应，至同治年间被李鸿章最终平定。
  tags: [革命政变]
  figures: [li_hongzhang]

- id: china_yunnan_muslim_uprising
  year: 1856
  endYear: 1873
  level: 2
  title: 云南回民起义
  summary: 杜文秀领导云南回民起义，建立大理政权，清军历时十余年平定，各方记载伤亡存在差异。
  tags: [革命政变]

- id: china_shaangansu_muslim_uprising
  year: 1862
  endYear: 1873
  level: 2
  title: 陕甘回民起义
  summary: 陕西、甘肃、宁夏回民大规模起义，清军在左宗棠率领下历时十年平定。
  tags: [革命政变]
  figures: [zuo_zongtang]

- id: china_zuo_xinjiang
  year: 1876
  endYear: 1878
  level: 2
  title: 左宗棠收复新疆
  summary: 左宗棠率军西征，击败已占据新疆的阿古柏政权，将新疆重新纳入清朝版图。
  tags: [战争]
  figures: [zuo_zongtang]

- id: china_xinjiang_province
  year: 1884
  level: 2
  title: 新疆建省
  summary: 清廷将新疆改设为省，刘锦棠为首任巡抚，改变此前以伊犁将军统辖的体制。
  tags: [改革运动]
  figures: [zuo_zongtang]

- id: china_sino_french_war
  year: 1884
  endYear: 1885
  level: 2
  title: 中法战争
  summary: 法国进攻越南与中国，双方在陆海两线均有胜负，签订《中法新约》后法国获越南保护权。
  tags: [战争, 条约外交]
  figures: [zuo_zongtang, liu_yongfu]

- id: china_northern_fleet
  year: 1888
  level: 2
  title: 北洋海军正式成军
  summary: 北洋舰队在李鸿章主持下于威海卫正式建军，拥有"定远""镇远"等主力铁甲舰。
  tags: [科技发明, 改革运动]
  figures: [li_hongzhang]

- id: china_taiwan_guerrilla_resist
  year: 1895
  level: 2
  title: 台湾民主国抗日
  summary: 台湾绅民成立台湾民主国，由唐景崧、刘永福领导抵抗日本接收，历时数月后失败。
  tags: [战争, 革命政变]
  figures: [liu_yongfu]

- id: china_triple_intervention
  year: 1895
  level: 2
  title: 三国干涉还辽
  summary: 俄法德三国联合向日本施压，迫使日本归还辽东半岛，但清朝需额外付款赎回。
  tags: [条约外交]

- id: china_kang_youwei_memorial
  year: 1895
  level: 2
  title: 公车上书
  summary: 康有为联合各省举人在北京联署上书，请求拒绝和约、变法图强，参与者达千余人。
  tags: [改革运动]
  figures: [kang_youwei, liang_qichao]

- id: china_treaty_ports_expand
  year: 1842
  endYear: 1900
  level: 2
  title: 通商口岸体系持续扩大
  summary: 历次条约使中国开放口岸从五个扩展至数十个，形成租界与通商口岸并存的双轨体系。
  tags: [条约外交, 经济贸易]

- id: china_yamen_school_tongwenguan
  year: 1862
  level: 2
  title: 同文馆创建
  summary: 清廷在北京设立同文馆，教授外语与西方知识，为中国近代外语教育的开端。
  tags: [改革运动, 科技发明]

- id: china_student_study_abroad
  year: 1872
  endYear: 1875
  level: 2
  title: 幼童留美计划
  summary: 清廷派遣120名幼童赴美留学，由容闳主持，为中国近代派遣官费留学生的首批。
  tags: [改革运动, 文化思想]
  figures: [li_hongzhang]

- id: china_tianjin_massacre
  year: 1870
  level: 2
  title: 天津教案
  summary: 天津民众与法国人冲突，导致大批外国传教士及中国教民死伤，清廷被迫赔偿道歉。
  tags: [条约外交]
  figures: [zeng_guofan]

# ===== Level 3 事件 =====

- id: china_jiaqing_death
  year: 1820
  level: 3
  title: 嘉庆帝驾崩
  summary: 嘉庆帝在热河行宫突然驾崩，道光帝继位，为清朝首位在北京以外去世的皇帝。
