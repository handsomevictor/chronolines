  figures: [mao_zedong]

- id: china_anti_rightist
  year: 1957
  endYear: 1958
  level: 2
  title: 反右运动
  summary: 约五十万人被划为"右派分子"，发配农场或基层接受改造，知识界遭受重大冲击。
  tags: [革命政变]
  figures: [mao_zedong]

- id: china_sino_soviet_split
  year: 1960
  endYear: 1963
  level: 2
  title: 中苏关系破裂
  summary: 中苏两党在意识形态上产生严重分歧，苏联撤走全部援华专家，两国关系急剧恶化。
  tags: [条约外交]
  figures: [mao_zedong]

- id: china_sino_indian_war
  year: 1962
  level: 2
  title: 中印边境战争
  summary: 中印两国在西段麦克马洪线附近发生边境武装冲突，中国军队获胜后主动后撤。
  tags: [战争]
  figures: [mao_zedong]

- id: china_nuclear_test_1964
  year: 1964
  level: 2
  title: 中国第一次核试验
