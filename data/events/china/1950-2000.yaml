  figures: [deng_jiaxian]

- id: china_lin_biao_incident
  year: 1971
  level: 2
  title: 林彪事件
  summary: 毛泽东接班人林彪死于蒙古境内坠机事故，官方称其政变未遂后出逃，各方说法存在差异。
