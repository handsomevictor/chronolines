# 中国 1950-2000 历史事件
# 涵盖中华人民共和国成立初期、文化大革命、改革开放、经济腾飞

# ===== Level 1 事件 =====

- id: china_korean_war
  year: 1950
  endYear: 1953
  level: 1
  title: 抗美援朝战争
  summary: 中国人民志愿军赴朝参战，与联合国军对峙，1953年签订停战协定，朝鲜半岛停火。
  tags: [战争]
  related: [usa_korean_war]
  figures: [mao_zedong, peng_dehuai]

- id: china_first_five_year_plan
  year: 1953
  endYear: 1957
  level: 1
  title: 第一个五年计划
  summary: 中国效仿苏联模式推行第一个五年计划，重点发展重工业，初步建立工业体系。
  tags: [经济贸易, 改革运动]
  figures: [mao_zedong]

- id: china_great_leap
  year: 1958
  endYear: 1960
  level: 1
  title: 大跃进运动
  summary: 大规模工农业生产运动推行虚报浮夸，目标严重脱离实际，随后出现严重饥荒。
  tags: [改革运动, 经济贸易]
  figures: [mao_zedong]

- id: china_great_famine
  year: 1959
  endYear: 1961
  level: 1
  title: 三年困难时期
  summary: 大跃进政策失误叠加自然灾害，全国出现严重粮食短缺，各方记载死亡数字存在差异。
  tags: [经济贸易]
  figures: [mao_zedong]

- id: china_cultural_revolution
  year: 1966
  endYear: 1976
  level: 1
  title: 文化大革命
  summary: 全国性政治运动席卷各地，大量文化遗产遭破坏，各方对运动性质及影响存在分歧。
  tags: [革命政变, 文化思想]
  figures: [mao_zedong, liu_shaoqi, deng_xiaoping]

- id: china_reform_opening
  year: 1978
  level: 1
  title: 改革开放政策确立
  summary: 中共十一届三中全会确立以经济建设为中心的改革开放路线，中国开始大规模经济改革。
  tags: [改革运动, 经济贸易]
  figures: [deng_xiaoping]

- id: china_hk_handover
  year: 1997
  level: 1
  title: 香港回归中国
  summary: 英国将香港主权移交中国，香港成为特别行政区，实行"一国两制"政策。
  tags: [条约外交]
  related: [uk_hk_handover]
  figures: [deng_xiaoping]

- id: china_macao_handover
  year: 1999
  level: 1
  title: 澳门回归中国
  summary: 葡萄牙将澳门主权移交中国，澳门成为特别行政区，"一国两制"适用于澳门。
  tags: [条约外交]

# ===== Level 2 事件 =====

- id: china_land_reform
  year: 1950
  endYear: 1952
  level: 2
  title: 全国土地改革
  summary: 中共推行全国性土地改革，没收地主土地分配给农民，约三亿农民获得土地。
  tags: [改革运动]
  figures: [mao_zedong]

- id: china_three_anti_five_anti
  year: 1951
  endYear: 1952
  level: 2
  title: 三反五反运动
  summary: 中共在党政机关开展反贪污、反浪费、反官僚主义，在工商界开展"五反"运动。
  tags: [改革运动]
  figures: [mao_zedong]

- id: china_socialist_transformation
  year: 1953
  endYear: 1956
  level: 2
  title: 社会主义改造
  summary: 对农业、手工业及工商业进行社会主义改造，私有制基本消灭，公有制确立。
  tags: [改革运动, 经济贸易]
  figures: [mao_zedong]

- id: china_hundred_flowers
  year: 1956
  endYear: 1957
  level: 2
  title: 百花运动
  summary: 中共鼓励知识分子"鸣放"批评，随即发动反右运动，大批知识分子被划为右派。
