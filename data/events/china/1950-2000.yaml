  figures: [mao_zedong, lin_biao]

- id: china_un_seat_restored
  year: 1971
  level: 2
  title: 中国恢复联合国席位
  summary: 联合国大会通过2758号决议，恢复中华人民共和国在联合国的合法席位，台湾退出联合国。
