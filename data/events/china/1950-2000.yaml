  figures: [mao_zedong]

- id: china_nixon_visit
  year: 1972
  level: 2
  title: 尼克松访华
  summary: 美国总统尼克松访问中国，签署《上海公报》，中美关系开始走向正常化。
  tags: [条约外交]
  figures: [mao_zedong, deng_xiaoping]
  related: [usa_nixon_china]

- id: china_mao_death
  year: 1976
  level: 2
  title: 毛泽东逝世
  summary: 毛泽东于1976年9月9日在北京逝世，终年83岁，其去世引发权力角逐。
