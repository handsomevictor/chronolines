  tags: [革命政变, 文化思想]
  related: [uk_american_independence]
  figures: [jefferson, franklin_b]

- id: usa_constitution_87
  year: 1787
  level: 1
  title: 美国宪法制定
  summary: 费城制宪会议通过联邦宪法，确立三权分立与联邦制度，1788年经各州批准正式生效。
