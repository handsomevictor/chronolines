- id: usa_first_continental_congress_74
  year: 1774
  level: 2
  title: 第一届大陆会议
  summary: 十二个殖民地代表在费城集会，协调应对英国强制法案，通过对英国货物联合抵制决议。
  tags: [革命政变, 条约外交]

- id: usa_lexington_concord_75
  year: 1775
  level: 2
  title: 莱克星顿与康科德战役
  summary: 英军出击搜缴武器，与民兵在莱克星顿交火，独立战争第一枪由此打响。
