  tags: [改革运动, 文化思想]
  figures: [madison]

# ===== Level 2 =====

- id: usa_colonial_charter_32
  year: 1732
  level: 2
  title: 佐治亚殖民地建立
  summary: 英王乔治二世批准佐治亚殖民地宪章，詹姆斯·奥格尔索普率移民建立萨凡纳城，第十三块殖民地成形。
  tags: [殖民扩张]

- id: usa_albany_plan_54
  year: 1754
  level: 2
  title: 《奥尔巴尼联合计划》
  summary: 本杰明·富兰克林提出各殖民地联合计划，以协调应对法国威胁，计划未获批准但奠定联合思想基础。
  tags: [条约外交, 文化思想]
