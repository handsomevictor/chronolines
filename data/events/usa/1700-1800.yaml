- id: usa_pontiac_rebellion_63
  year: 1763
  level: 2
  title: 庞蒂亚克起义
  summary: 渥太华酋长庞蒂亚克率多部落反抗英国西进，英军艰难平定，随后颁布《1763年公告》限制殖民扩张。
