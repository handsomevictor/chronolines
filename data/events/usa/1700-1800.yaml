  tags: [革命政变, 战争]

- id: usa_boston_tea_party_73
  year: 1773
  level: 2
  title: 波士顿倾茶事件
  summary: 殖民地人士乔装印第安人登上英国商船，将342箱茶叶倒入波士顿湾，抗议《茶税法》。
