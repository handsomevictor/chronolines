<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chronolines — 多轨道历史时间线</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top control bar -->
  <header class="app-header" id="app-header">
    <div class="header-left">
      <h1 class="app-title">Chronolines</h1>
      <span class="app-subtitle">1700–2025 · 多国历史时间轴</span>
    </div>
    <div class="header-center">
      <div class="year-range-display" id="year-range-display">1700 — 2025</div>
    </div>
    <div class="header-right">
      <div class="level-controls" id="level-controls">
        <button class="level-btn" data-level="1" title="只显示 Level 1 大事件">L1</button>
        <button class="level-btn" data-level="2" title="显示 Level 1 + 2">L2</button>
        <button class="level-btn" data-level="3" title="显示全部三级">L3</button>
        <button class="level-btn active" data-level="all" title="显示全部（默认）">全部</button>
      </div>
      <div class="search-box">
        <input type="text" id="search-input" class="search-input" placeholder="搜索事件…" autocomplete="off">
      </div>
      <div class="zoom-controls">
        <button id="btn-zoom-in" class="ctrl-btn" title="放大 (+)">+</button>
        <button id="btn-zoom-reset" class="ctrl-btn" title="重置视图 (0)">重置</button>
        <button id="btn-zoom-out" class="ctrl-btn" title="缩小 (-)">−</button>
      </div>
    </div>
  </header>

  <!-- Tag filter bar -->
  <div class="filter-bar" id="filter-bar">
    <div class="filter-section">
      <span class="filter-label">事件</span>
      <div class="tag-chips" id="tag-chips">
        <button class="tag-chip active" data-tag="all">全部</button>
        <button class="tag-chip" data-tag="战争">战争</button>
        <button class="tag-chip" data-tag="条约外交">条约外交</button>
        <button class="tag-chip" data-tag="革命政变">革命政变</button>
        <button class="tag-chip" data-tag="改革运动">改革运动</button>
        <button class="tag-chip" data-tag="经济贸易">经济贸易</button>
        <button class="tag-chip" data-tag="科技发明">科技发明</button>
        <button class="tag-chip" data-tag="文化思想">文化思想</button>
        <button class="tag-chip" data-tag="王朝更迭">王朝更迭</button>
        <button class="tag-chip" data-tag="殖民扩张">殖民扩张</button>
        <button class="tag-chip" data-tag="人物">人物</button>
      </div>
    </div>
    <div class="filter-divider"></div>
    <div class="filter-section">
      <span class="filter-label">人物</span>
      <div class="category-chips" id="category-chips">
        <button class="cat-chip active" data-category="none">关闭</button>
        <button class="cat-chip" data-category="政治">政治</button>
        <button class="cat-chip" data-category="军事">军事</button>
        <button class="cat-chip" data-category="科学">科学</button>
        <button class="cat-chip" data-category="文学">文学</button>
        <button class="cat-chip" data-category="音乐">音乐</button>
        <button class="cat-chip" data-category="艺术">艺术</button>
        <button class="cat-chip" data-category="经济金融">经济金融</button>
        <button class="cat-chip" data-category="哲学思想">哲学思想</button>
      </div>
    </div>
  </div>

  <!-- Visible year range bar -->
  <div class="year-bar" id="year-bar">
    <span class="year-bar-label">可见年份</span>
    <span class="year-bar-range" id="year-bar-range">1700 — 2000</span>
    <span class="year-bar-hint">滚轮缩放 · 拖拽平移</span>
  </div>

  <!-- Main layout -->
  <div class="main-layout" id="main-layout">
    <!-- Left sidebar: track labels -->
    <div class="sidebar" id="sidebar">
      <!-- Labels are injected by JS with absolute positioning -->
    </div>

    <!-- SVG canvas area -->
    <div class="canvas-wrapper" id="canvas-wrapper">
      <svg id="timeline-svg" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow-filter" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <filter id="shadow-filter" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.5)"/>
          </filter>
        </defs>
        <!-- Layers in z-order -->
        <g id="layer-bands"></g>
        <g id="layer-rulers"></g>
        <g id="layer-grid"></g>
        <g id="layer-figures"></g>
        <g id="layer-events"></g>
        <g id="layer-arcs"></g>
        <g id="layer-labels"></g>
        <g id="layer-hover"></g>
      </svg>
    </div>
  </div>

  <!-- Bottom fixed time axis -->
  <div class="time-axis" id="time-axis">
    <canvas id="axis-canvas"></canvas>
  </div>

  <!-- Hover tooltip -->
  <div id="tooltip" class="tooltip" style="display:none"></div>

  <!-- Detail panel (right drawer) -->
  <div id="detail-panel" class="detail-panel hidden">
    <div class="detail-header">
      <div class="detail-header-track" id="detail-track-badge"></div>
      <button class="detail-close" id="detail-close" title="关闭 (Esc)">×</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>

  <script src="js/layout.js"></script>
  <script src="js/tooltip.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/drag-sort.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
